<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Fluxo de Caixa</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        .header h1 { color: #667eea; }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .form-group { margin-bottom: 15px; }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.3s;
        }
        button:hover { background: #764ba2; transform: translateY(-2px); }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th { background: #667eea; color: white; }
        .entrada { color: green; font-weight: bold; }
        .saida { color: red; font-weight: bold; }
        .saldo-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .saldo-valor { font-size: 3em; font-weight: bold; }
        .login-container { max-width: 400px; margin: 100px auto; }
        .message {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        .logout-btn {
            background: #dc3545;
            float: right;
            margin-top: -50px;
        }
        .chart-container {
            max-width: 100%;
            margin: 20px 0;
        }
        canvas { max-height: 300px; }
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: #e0e0e0;
            color: #333;
            flex: 1;
        }
        .tab-btn.active {
            background: #667eea;
            color: white;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .filter-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: flex-end;
        }
        .filter-group .form-group { flex: 1; margin-bottom: 0; }
        .filter-group button { width: auto; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Tela de Login -->
        <div id="loginScreen" class="login-container">
            <div class="card">
                <h2 style="text-align: center;">🔐 Login</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label>Usuário</label>
                        <input type="text" id="username" required>
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" id="password" required>
                    </div>
                    <button type="submit" style="width: 100%;">Entrar</button>
                </form>
                <div id="loginMessage"></div>
            </div>
        </div>

        <!-- Tela Principal -->
        <div id="mainScreen" style="display: none;">
            <div class="header">
                <h1>💰 Sistema de Fluxo de Caixa</h1>
                <button onclick="logout()" class="logout-btn">Sair</button>
            </div>

            <!-- Saldo -->
            <div class="saldo-card">
                <h3>💰 SALDO ATUAL</h3>
                <div class="saldo-valor" id="saldo">R$ 0,00</div>
                <div style="margin-top: 10px;">
                    <small>📈 Entradas: <span id="totalEntradas">R$ 0,00</span> | 📉 Saídas: <span id="totalSaidas">R$ 0,00</span></small>
                </div>
            </div>

            <!-- Abas -->
            <div class="card">
                <div class="tab-buttons">
                    <button class="tab-btn active" onclick="mudarAba('movimentacao')">📝 Movimentações</button>
                    <button class="tab-btn" onclick="mudarAba('relatorio')">📊 Relatórios</button>
                    <button class="tab-btn" onclick="mudarAba('extrato')">📋 Extrato</button>
                </div>

                <!-- Aba Movimentação -->
                <div id="tab-movimentacao" class="tab-content active">
                    <form id="movimentacaoForm">
                        <div class="form-group">
                            <label>Tipo</label>
                            <select id="tipo" required>
                                <option value="entrada">💰 Entrada</option>
                                <option value="saida">💸 Saída</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Valor (R$)</label>
                            <input type="number" id="valor" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label>Descrição</label>
                            <input type="text" id="descricao" required>
                        </div>
                        <button type="submit">Registrar</button>
                    </form>
                    <div id="movMessage"></div>
                </div>

                <!-- Aba Relatório -->
                <div id="tab-relatorio" class="tab-content">
                    <div class="filter-group">
                        <div class="form-group">
                            <label>Data Início</label>
                            <input type="date" id="data_inicio">
                        </div>
                        <div class="form-group">
                            <label>Data Fim</label>
                            <input type="date" id="data_fim">
                        </div>
                        <button onclick="carregarRelatorio()">Filtrar</button>
                        <button onclick="limparFiltro()">Limpar</button>
                    </div>
                    <div class="chart-container">
                        <canvas id="graficoMovimentacoes"></canvas>
                    </div>
                    <div style="overflow-x: auto;">
                        <table id="relatorioTable">
                            <thead>
                                <tr><th>Data</th><th>Entradas</th><th>Saídas</th><th>Saldo do Dia</th></tr>
                            </thead>
                            <tbody id="relatorioBody">
                                <tr><td colspan="4" style="text-align: center;">Selecione um período</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Aba Extrato -->
                <div id="tab-extrato" class="tab-content">
                    <div style="overflow-x: auto;">
                        <table id="extratoTable">
                            <thead>
                                <tr><th>ID</th><th>Tipo</th><th>Valor</th><th>Descrição</th><th>Data</th><th>Ação</th></tr>
                            </thead>
                            <tbody id="extratoBody">
                                <tr><td colspan="6" style="text-align: center;">Carregando...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:3000";
        let meuGrafico = null;

        // Login
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (data.sucesso) {
                    document.getElementById("loginScreen").style.display = "none";
                    document.getElementById("mainScreen").style.display = "block";
                    carregarDados();
                    carregarRelatorio();
                } else {
                    document.getElementById("loginMessage").innerHTML = `<div class="message error">❌ ${data.erro || "Erro no login"}</div>`;
                }
            } catch (error) {
                document.getElementById("loginMessage").innerHTML = `<div class="message error">❌ Erro ao conectar ao servidor</div>`;
            }
        });

        // Registrar movimentação
        document.getElementById("movimentacaoForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const tipo = document.getElementById("tipo").value;
            const valor = document.getElementById("valor").value;
            const descricao = document.getElementById("descricao").value;
            try {
                const response = await fetch(`${API_URL}/movimentacao`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ tipo, valor, descricao })
                });
                const data = await response.json();
                if (data.sucesso) {
                    document.getElementById("movMessage").innerHTML = `<div class="message success">✅ ${data.mensagem}</div>`;
                    document.getElementById("movimentacaoForm").reset();
                    carregarDados();
                    carregarRelatorio();
                    setTimeout(() => { document.getElementById("movMessage").innerHTML = ""; }, 3000);
                } else {
                    document.getElementById("movMessage").innerHTML = `<div class="message error">❌ ${data.erro}</div>`;
                }
            } catch (error) {
                document.getElementById("movMessage").innerHTML = `<div class="message error">❌ Erro ao registrar</div>`;
            }
        });

        // Carregar dados
        async function carregarDados() { await carregarExtrato(); await carregarSaldo(); }

        // Carregar extrato
        async function carregarExtrato() {
            try {
                const response = await fetch(`${API_URL}/extrato`);
                const data = await response.json();
                const tbody = document.getElementById("extratoBody");
                if (data.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='6' style='text-align: center;'>Nenhuma movimentação registrada</td></tr>";
                    return;
                }
                tbody.innerHTML = data.map(item => `
                    <tr>
                        <td>${item.id}</td>
                        <td class="${item.tipo}">${item.tipo === "entrada" ? "💰 Entrada" : "💸 Saída"}</td>
                        <td class="${item.tipo}">R$ ${parseFloat(item.valor).toFixed(2)}</td>
                        <td>${item.descricao}</td>
                        <td>${new Date(item.data).toLocaleString("pt-BR")}</td>
                        <td><button class="delete-btn" onclick="deletarMovimentacao(${item.id})">🗑️</button></td>
                    </tr>
                `).join("");
            } catch (error) { console.error(error); }
        }

        // Carregar saldo
        async function carregarSaldo() {
            try {
                const response = await fetch(`${API_URL}/saldo`);
                const data = await response.json();
                document.getElementById("saldo").innerHTML = `R$ ${parseFloat(data.saldo).toFixed(2)}`;
                document.getElementById("totalEntradas").innerHTML = `R$ ${parseFloat(data.total_entradas).toFixed(2)}`;
                document.getElementById("totalSaidas").innerHTML = `R$ ${parseFloat(data.total_saidas).toFixed(2)}`;
            } catch (error) { console.error(error); }
        }

        // Carregar relatório
        async function carregarRelatorio() {
            let url = `${API_URL}/relatorio`;
            const data_inicio = document.getElementById("data_inicio").value;
            const data_fim = document.getElementById("data_fim").value;
            
            if (data_inicio && data_fim) {
                url += `?data_inicio=${data_inicio}&data_fim=${data_fim}`;
            }
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                // Atualizar tabela
                const tbody = document.getElementById("relatorioBody");
                if (data.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='4' style='text-align: center;'>Nenhum dado encontrado</td></tr>";
                } else {
                    tbody.innerHTML = data.map(item => `
                        <tr>
                            <td>${new Date(item.data).toLocaleDateString("pt-BR")}</td>
                            <td class="entrada">R$ ${parseFloat(item.entradas).toFixed(2)}</td>
                            <td class="saida">R$ ${parseFloat(item.saidas).toFixed(2)}</td>
                            <td>R$ ${parseFloat(item.saldo_dia).toFixed(2)}</td>
                        </tr>
                    `).join("");
                }
                
                // Atualizar gráfico
                const datas = data.map(item => new Date(item.data).toLocaleDateString("pt-BR"));
                const entradas = data.map(item => parseFloat(item.entradas));
                const saidas = data.map(item => parseFloat(item.saidas));
                
                if (meuGrafico) { meuGrafico.destroy(); }
                
                const ctx = document.getElementById('graficoMovimentacoes').getContext('2d');
                meuGrafico = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: datas,
                        datasets: [
                            {
                                label: 'Entradas',
                                data: entradas,
                                backgroundColor: 'rgba(40, 167, 69, 0.7)',
                                borderColor: 'green',
                                borderWidth: 1
                            },
                            {
                                label: 'Saídas',
                                data: saidas,
                                backgroundColor: 'rgba(220, 53, 69, 0.7)',
                                borderColor: 'red',
                                borderWidth: 1
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        scales: {
                            y: {
                                beginAtZero: true,
                                title: { display: true, text: 'Valor (R$)' }
                            },
                            x: {
                                title: { display: true, text: 'Data' }
                            }
                        }
                    }
                });
            } catch (error) { console.error(error); }
        }

        // Deletar movimentação
        async function deletarMovimentacao(id) {
            if (confirm("Tem certeza que deseja deletar esta movimentação?")) {
                try {
                    const response = await fetch(`${API_URL}/movimentacao/${id}`, { method: "DELETE" });
                    const data = await response.json();
                    if (data.sucesso) { 
                        carregarDados(); 
                        carregarRelatorio();
                        alert("✅ Movimentação deletada!"); 
                    } else { 
                        alert("❌ Erro ao deletar"); 
                    }
                } catch (error) { alert("❌ Erro ao conectar ao servidor"); }
            }
        }

        // Funções de interface
        function mudarAba(aba) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${aba}`).classList.add('active');
            event.target.classList.add('active');
            if (aba === 'relatorio') { carregarRelatorio(); }
        }

        function limparFiltro() {
            document.getElementById("data_inicio").value = "";
            document.getElementById("data_fim").value = "";
            carregarRelatorio();
        }

        function logout() {
            document.getElementById("loginScreen").style.display = "block";
            document.getElementById("mainScreen").style.display = "none";
            document.getElementById("loginForm").reset();
            document.getElementById("loginMessage").innerHTML = "";
        }
    </script>
</body>
</html>
