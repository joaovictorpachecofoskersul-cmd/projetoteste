<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Gestão de Produtos - Fluxo de Caixa</title>
    <style>
        :root {
            --primary: #4361ee;
            --primary-dark: #3a56d4;
            --secondary: #7209b7;
            --success: #06d6a0;
            --danger: #ef476f;
            --warning: #ffd166;
            --dark: #2b2d42;
            --light: #f8f9fa;
            --gray: #6c757d;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --shadow-hover: 0 15px 40px rgba(0,0,0,0.15);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: var(--shadow);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }

        .logo h1 {
            font-size: 24px;
            color: var(--dark);
        }

        .logo p {
            font-size: 12px;
            color: var(--gray);
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: var(--light);
            color: var(--dark);
            padding: 10px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        .logout-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
        }

        .logout-btn:hover {
            background: #d43f63;
            transform: translateY(-2px);
        }

        .card {
            background: var(--white);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }

        .card h2 {
            margin-bottom: 20px;
            color: var(--dark);
            font-size: 20px;
            border-left: 4px solid var(--primary);
            padding-left: 15px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 14px;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }

        .btn-moderno {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: var(--transition);
        }

        .btn-moderno:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #d43f63);
        }

        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .search-bar input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: var(--light);
            font-weight: bold;
            color: var(--dark);
        }

        tr:hover {
            background: var(--light);
        }

        .estoque-baixo {
            color: var(--danger);
            font-weight: bold;
        }

        .estoque-normal {
            color: var(--success);
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            width: 450px;
            max-width: 90%;
            box-shadow: var(--shadow);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .header { flex-direction: column; text-align: center; }
            .nav-buttons { justify-content: center; }
            table { font-size: 12px; }
            th, td { padding: 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">📦</div>
                <div>
                    <h1>Gestão de Produtos</h1>
                    <p>Controle de estoque e produtos</p>
                </div>
            </div>
            <div class="nav-buttons">
                <a href="/" class="nav-btn">💰 Fluxo de Caixa</a>
                <a href="/pdv" class="nav-btn">🛒 PDV</a>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
        </div>

        <div class="card">
            <h2>➕ Cadastrar Novo Produto</h2>
            <form id="formProduto">
                <div class="form-row">
                    <div class="form-group">
                        <label>Código de Barras</label>
                        <input type="text" id="codigo_barras" placeholder="Código de barras">
                    </div>
                    <div class="form-group">
                        <label>Nome do Produto *</label>
                        <input type="text" id="nome" required placeholder="Ex: Arroz 5kg">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Categoria</label>
                        <input type="text" id="categoria" placeholder="Ex: Alimentos, Bebidas...">
                    </div>
                    <div class="form-group">
                        <label>Preço de Custo (R$)</label>
                        <input type="number" id="preco_custo" step="0.01" placeholder="0,00">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Preço de Venda (R$) *</label>
                        <input type="number" id="preco_venda" step="0.01" required placeholder="0,00">
                    </div>
                    <div class="form-group">
                        <label>Estoque Inicial</label>
                        <input type="number" id="estoque" value="0" placeholder="0">
                    </div>
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="descricao" rows="2" placeholder="Descrição do produto"></textarea>
                </div>
                <button type="submit" class="btn-moderno">Cadastrar Produto</button>
            </form>
            <div id="mensagem" class="message"></div>
        </div>

        <div class="card">
            <h2>🔍 Buscar Produto</h2>
            <div class="search-bar">
                <input type="text" id="busca" placeholder="Buscar por nome ou código de barras...">
                <button onclick="buscarProdutos()" class="btn-moderno">Buscar</button>
                <button onclick="carregarProdutos()" class="btn-moderno" style="background: var(--gray);">Mostrar Todos</button>
            </div>
        </div>

        <div class="card">
            <h2>📋 Lista de Produtos</h2>
            <div style="overflow-x: auto;">
                <table id="tabelaProdutos">
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Nome</th>
                            <th>Categoria</th>
                            <th>Preço Venda</th>
                            <th>Estoque</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaProdutos">
                        <tr><td colspan="7" style="text-align: center;">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modalEstoque" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">📦 Ajustar Estoque</h3>
            <div class="form-group">
                <label>Produto</label>
                <input type="text" id="modalProdutoNome" readonly style="background: #f5f5f5;">
            </div>
            <div class="form-group">
                <label>Estoque Atual</label>
                <input type="text" id="modalEstoqueAtual" readonly style="background: #f5f5f5;">
            </div>
            <div class="form-group">
                <label>Quantidade</label>
                <input type="number" id="modalQuantidade" placeholder="Quantidade">
            </div>
            <div class="form-group">
                <label>Operação</label>
                <select id="modalOperacao">
                    <option value="add">➕ Adicionar ao estoque</option>
                    <option value="remove">➖ Remover do estoque</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="ajustarEstoque()" class="btn-moderno">Aplicar</button>
                <button onclick="fecharModal()" class="btn-moderno btn-danger">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let produtoIdAtual = null;

        function formatarMoeda(valor) {
            return 'R$ ' + valor.toFixed(2).replace('.', ',');
        }

        async function carregarProdutos() {
            try {
                const res = await fetch('/api/produtos');
                const data = await res.json();
                
                if (data.success) {
                    const tbody = document.getElementById('listaProdutos');
                    
                    if (data.produtos.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">Nenhum produto cadastrado</td></tr>';
                        return;
                    }
                    
                    tbody.innerHTML = data.produtos.map(p => `
                        <tr>
                            <td>${p.codigo_barras || '-'}</td>
                            <td><strong>${p.nome}</strong></td>
                            <td>${p.categoria || '-'}</td>
                            <td>${formatarMoeda(p.preco_venda)}</td>
                            <td class="${p.estoque < 5 ? 'estoque-baixo' : 'estoque-normal'}">${p.estoque}</td>
                            <td>${p.estoque < 5 ? '⚠️ Estoque Baixo' : '✅ Normal'}</td>
                            <td>
                                <button onclick="abrirModalEstoque(${p.id}, '${p.nome}', ${p.estoque})" style="padding: 5px 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer;">📦 Ajustar</button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                console.error('Erro:', err);
            }
        }

        async function buscarProdutos() {
            const busca = document.getElementById('busca').value.toLowerCase();
            if (!busca) {
                carregarProdutos();
                return;
            }
            
            try {
                const res = await fetch('/api/produtos');
                const data = await res.json();
                
                if (data.success) {
                    const filtrados = data.produtos.filter(p => 
                        p.nome.toLowerCase().includes(busca) || 
                        (p.codigo_barras && p.codigo_barras.includes(busca))
                    );
                    
                    const tbody = document.getElementById('listaProdutos');
                    
                    if (filtrados.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">Nenhum produto encontrado</td></tr>';
                        return;
                    }
                    
                    tbody.innerHTML = filtrados.map(p => `
                        <tr>
                            <td>${p.codigo_barras || '-'}</td>
                            <td><strong>${p.nome}</strong></td>
                            <td>${p.categoria || '-'}</td>
                            <td>${formatarMoeda(p.preco_venda)}</td>
                            <td class="${p.estoque < 5 ? 'estoque-baixo' : 'estoque-normal'}">${p.estoque}</td>
                            <td>${p.estoque < 5 ? '⚠️ Estoque Baixo' : '✅ Normal'}</td>
                            <td>
                                <button onclick="abrirModalEstoque(${p.id}, '${p.nome}', ${p.estoque})" style="padding: 5px 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer;">📦 Ajustar</button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                console.error('Erro:', err);
            }
        }

        function abrirModalEstoque(id, nome, estoqueAtual) {
            produtoIdAtual = id;
            document.getElementById('modalProdutoNome').value = nome;
            document.getElementById('modalEstoqueAtual').value = estoqueAtual;
            document.getElementById('modalQuantidade').value = '';
            document.getElementById('modalOperacao').value = 'add';
            document.getElementById('modalEstoque').style.display = 'flex';
        }

        async function ajustarEstoque() {
            const quantidade = parseInt(document.getElementById('modalQuantidade').value);
            const operacao = document.getElementById('modalOperacao').value;
            
            if (!quantidade || quantidade <= 0) {
                alert('Digite uma quantidade válida');
                return;
            }
            
            try {
                const res = await fetch(`/api/produtos/${produtoIdAtual}/estoque`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quantidade, operacao })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    alert('✅ Estoque atualizado com sucesso!');
                    fecharModal();
                    carregarProdutos();
                } else {
                    alert(data.error || 'Erro ao atualizar estoque');
                }
            } catch (err) {
                alert('❌ Erro ao conectar');
            }
        }

        function fecharModal() {
            document.getElementById('modalEstoque').style.display = 'none';
            produtoIdAtual = null;
        }

        document.getElementById('formProduto').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const produto = {
                codigo_barras: document.getElementById('codigo_barras').value,
                nome: document.getElementById('nome').value,
                descricao: document.getElementById('descricao').value,
                preco_custo: parseFloat(document.getElementById('preco_custo').value) || 0,
                preco_venda: parseFloat(document.getElementById('preco_venda').value),
                estoque: parseInt(document.getElementById('estoque').value) || 0,
                categoria: document.getElementById('categoria').value
            };
            
            try {
                const res = await fetch('/api/produtos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(produto)
                });
                
                const data = await res.json();
                const msg = document.getElementById('mensagem');
                
                if (data.success) {
                    msg.innerHTML = '✅ Produto cadastrado com sucesso!';
                    msg.className = 'message success';
                    document.getElementById('formProduto').reset();
                    carregarProdutos();
                    setTimeout(() => { msg.innerHTML = ''; }, 3000);
                } else {
                    msg.innerHTML = '❌ ' + (data.error || 'Erro ao cadastrar');
                    msg.className = 'message error';
                }
            } catch (err) {
                document.getElementById('mensagem').innerHTML = '❌ Erro ao conectar';
                document.getElementById('mensagem').className = 'message error';
            }
        });

        function logout() {
            window.location.href = '/';
        }

        carregarProdutos();
    </script>
</body>
</html>
