<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Produtos - Fluxo de Caixa</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #333;
            font-size: 28px;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            background: #5a67d8;
        }

        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .card h2 {
            margin-bottom: 20px;
            color: #333;
            border-left: 4px solid #667eea;
            padding-left: 15px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        button:hover {
            background: #218838;
        }

        .btn-danger {
            background: #dc3545;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f8f9fa;
            font-weight: bold;
            color: #555;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .estoque-baixo {
            color: #dc3545;
            font-weight: bold;
        }

        .estoque-normal {
            color: #28a745;
        }

        .search-bar {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .search-bar input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .search-bar button {
            padding: 12px 20px;
            background: #667eea;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 500px;
            max-width: 90%;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            table {
                font-size: 12px;
            }
            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Gestão de Produtos e Estoque</h1>
            <div class="nav-buttons">
                <a href="/" class="nav-btn">💰 Fluxo de Caixa</a>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
        </div>

        <div class="card">
            <h2>➕ Cadastrar Novo Produto</h2>
            <form id="formProduto">
                <div class="form-row">
                    <div class="form-group">
                        <label>Código de Barras</label>
                        <input type="text" id="codigo_barras" placeholder="Código de barras">
                    </div>
                    <div class="form-group">
                        <label>Nome do Produto *</label>
                        <input type="text" id="nome" required placeholder="Ex: Arroz 5kg">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Categoria</label>
                        <input type="text" id="categoria" placeholder="Ex: Alimentos, Bebidas...">
                    </div>
                    <div class="form-group">
                        <label>Preço de Custo (R$)</label>
                        <input type="number" id="preco_custo" step="0.01" placeholder="0,00">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Preço de Venda (R$) *</label>
                        <input type="number" id="preco_venda" step="0.01" required placeholder="0,00">
                    </div>
                    <div class="form-group">
                        <label>Estoque Inicial</label>
                        <input type="number" id="estoque" value="0" placeholder="0">
                    </div>
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="descricao" rows="2" placeholder="Descrição do produto"></textarea>
                </div>
                <button type="submit">Cadastrar Produto</button>
            </form>
            <div id="mensagem" class="message"></div>
        </div>

        <div class="card">
            <h2>🔍 Buscar Produto</h2>
            <div class="search-bar">
                <input type="text" id="busca" placeholder="Buscar por nome ou código de barras...">
                <button onclick="buscarProdutos()">Buscar</button>
                <button onclick="carregarProdutos()" style="background: #6c757d;">Mostrar Todos</button>
            </div>
        </div>

        <div class="card">
            <h2>📋 Lista de Produtos</h2>
            <div style="overflow-x: auto;">
                <table id="tabelaProdutos">
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Nome</th>
                            <th>Categoria</th>
                            <th>Preço Venda</th>
                            <th>Estoque</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaProdutos">
                        <tr><td colspan="7" style="text-align: center;">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal para ajustar estoque -->
    <div id="modalEstoque" class="modal">
        <div class="modal-content">
            <h3>Ajustar Estoque</h3>
            <div class="form-group">
                <label>Produto</label>
                <input type="text" id="modalProdutoNome" readonly>
            </div>
            <div class="form-group">
                <label>Estoque Atual</label>
                <input type="text" id="modalEstoqueAtual" readonly>
            </div>
            <div class="form-group">
                <label>Quantidade</label>
                <input type="number" id="modalQuantidade" placeholder="Quantidade">
            </div>
            <div class="form-group">
                <label>Operação</label>
                <select id="modalOperacao">
                    <option value="add">➕ Adicionar ao estoque</option>
                    <option value="remove">➖ Remover do estoque</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="ajustarEstoque()">Aplicar</button>
                <button onclick="fecharModal()" class="btn-danger">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let produtoIdAtual = null;

        async function carregarProdutos() {
            try {
                const res = await fetch('/api/produtos');
                const data = await res.json();
                
                if (data.success) {
                    const tbody = document.getElementById('listaProdutos');
                    
                    if (data.produtos.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">Nenhum produto cadastrado</td></tr>';
                        return;
                    }
                    
                    tbody.innerHTML = data.produtos.map(p => `
                        <tr>
                            <td>${p.codigo_barras || '-'}</td>
                            <td>${p.nome}</td>
                            <td>${p.categoria || '-'}</td>
                            <td>R$ ${parseFloat(p.preco_venda).toFixed(2)}</td>
                            <td class="${p.estoque < p.estoque_minimo ? 'estoque-baixo' : 'estoque-normal'}">${p.estoque}</td>
                            <td>${p.estoque < (p.estoque_minimo || 5) ? '⚠️ Estoque Baixo' : '✅ Normal'}</td>
                            <td>
                                <button onclick="abrirModalEstoque(${p.id}, '${p.nome}', ${p.estoque})" style="padding: 5px 10px; font-size: 12px;">📦 Ajustar</button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                console.error('Erro:', err);
            }
        }

        async function buscarProdutos() {
            const busca = document.getElementById('busca').value.toLowerCase();
            if (!busca) {
                carregarProdutos();
                return;
            }
            
            try {
                const res = await fetch('/api/produtos');
                const data = await res.json();
                
                if (data.success) {
                    const filtrados = data.produtos.filter(p => 
                        p.nome.toLowerCase().includes(busca) || 
                        (p.codigo_barras && p.codigo_barras.includes(busca))
                    );
                    
                    const tbody = document.getElementById('listaProdutos');
                    
                    if (filtrados.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">Nenhum produto encontrado</td></tr>';
                        return;
                    }
                    
                    tbody.innerHTML = filtrados.map(p => `
                        <tr>
                            <td>${p.codigo_barras || '-'}</td>
                            <td>${p.nome}</td>
                            <td>${p.categoria || '-'}</td>
                            <td>R$ ${parseFloat(p.preco_venda).toFixed(2)}</td>
                            <td class="${p.estoque < (p.estoque_minimo || 5) ? 'estoque-baixo' : 'estoque-normal'}">${p.estoque}</td>
                            <td>${p.estoque < (p.estoque_minimo || 5) ? '⚠️ Estoque Baixo' : '✅ Normal'}</td>
                            <td>
                                <button onclick="abrirModalEstoque(${p.id}, '${p.nome}', ${p.estoque})" style="padding: 5px 10px; font-size: 12px;">📦 Ajustar</button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                console.error('Erro:', err);
            }
        }

        function abrirModalEstoque(id, nome, estoqueAtual) {
            produtoIdAtual = id;
            document.getElementById('modalProdutoNome').value = nome;
            document.getElementById('modalEstoqueAtual').value = estoqueAtual;
            document.getElementById('modalQuantidade').value = '';
            document.getElementById('modalOperacao').value = 'add';
            document.getElementById('modalEstoque').style.display = 'flex';
        }

        async function ajustarEstoque() {
            const quantidade = parseInt(document.getElementById('modalQuantidade').value);
            const operacao = document.getElementById('modalOperacao').value;
            
            if (!quantidade || quantidade <= 0) {
                alert('Digite uma quantidade válida');
                return;
            }
            
            try {
                const res = await fetch(`/api/produtos/${produtoIdAtual}/estoque`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quantidade, operacao })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    alert('Estoque atualizado com sucesso!');
                    fecharModal();
                    carregarProdutos();
                } else {
                    alert(data.error || 'Erro ao atualizar estoque');
                }
            } catch (err) {
                alert('Erro ao conectar');
            }
        }

        function fecharModal() {
            document.getElementById('modalEstoque').style.display = 'none';
            produtoIdAtual = null;
        }

        document.getElementById('formProduto').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const produto = {
                codigo_barras: document.getElementById('codigo_barras').value,
                nome: document.getElementById('nome').value,
                descricao: document.getElementById('descricao').value,
                preco_custo: parseFloat(document.getElementById('preco_custo').value) || 0,
                preco_venda: parseFloat(document.getElementById('preco_venda').value),
                estoque: parseInt(document.getElementById('estoque').value) || 0,
                categoria: document.getElementById('categoria').value
            };
            
            try {
                const res = await fetch('/api/produtos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(produto)
                });
                
                const data = await res.json();
                const msg = document.getElementById('mensagem');
                
                if (data.success) {
                    msg.innerHTML = '✅ Produto cadastrado com sucesso!';
                    msg.className = 'message success';
                    document.getElementById('formProduto').reset();
                    carregarProdutos();
                    setTimeout(() => { msg.innerHTML = ''; }, 3000);
                } else {
                    msg.innerHTML = '❌ ' + (data.error || 'Erro ao cadastrar');
                    msg.className = 'message error';
                }
            } catch (err) {
                document.getElementById('mensagem').innerHTML = '❌ Erro ao conectar';
                document.getElementById('mensagem').className = 'message error';
            }
        });

        function logout() {
            window.location.href = '/';
        }

        carregarProdutos();
    </script>
</body>
</html>
