<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluxo de Caixa</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
}

.header {
    background: white;
    border-radius: 15px;
    padding: 20px 30px;
    margin-bottom: 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.header h1 {
    color: #333;
    font-size: 28px;
}

.logout-btn {
    background: #dc3545;
    color: white;
    border: none;
    padding: 10px 25px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
}

.dashboard-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 25px;
    margin-bottom: 30px;
}

.card {
    background: white;
    border-radius: 15px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.card h3 {
    color: #666;
    font-size: 14px;
    text-transform: uppercase;
    margin-bottom: 15px;
}

.valor {
    font-size: 32px;
    font-weight: bold;
}

.valor.positivo {
    color: #28a745;
}

.valor.negativo {
    color: #dc3545;
}

.row-duas-colunas {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 25px;
    margin-bottom: 30px;
}

.card-grafico, .card-relatorio {
    background: white;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.card-grafico h3, .card-relatorio h3 {
    color: #333;
    margin-bottom: 20px;
    font-size: 18px;
    border-left: 4px solid #667eea;
    padding-left: 15px;
}

canvas {
    max-height: 300px;
    width: 100%;
}

.relatorio-lista {
    max-height: 300px;
    overflow-y: auto;
}

.relatorio-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px;
    border-bottom: 1px solid #eee;
}

.relatorio-item:hover {
    background: #f8f9fa;
}

.relatorio-data {
    font-size: 12px;
    color: #888;
    min-width: 80px;
}

.relatorio-descricao {
    flex: 1;
    margin: 0 15px;
}

.relatorio-valor {
    font-weight: bold;
}

.relatorio-valor.entrada {
    color: #28a745;
}

.relatorio-valor.saida {
    color: #dc3545;
}

.form-movimentacao {
    background: white;
    border-radius: 15px;
    padding: 25px;
    margin-bottom: 30px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.form-movimentacao h3 {
    margin-bottom: 20px;
    color: #333;
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    color: #555;
    font-weight: 500;
}

.form-group input, .form-group select {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
}

button[type="submit"] {
    background: #667eea;
    color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
}

.message {
    margin-top: 15px;
    padding: 10px;
    border-radius: 8px;
    text-align: center;
}

.message.success {
    background: #d4edda;
    color: #155724;
}

.message.error {
    background: #f8d7da;
    color: #721c24;
}

.login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.login-card {
    background: white;
    border-radius: 20px;
    padding: 40px;
    width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

.login-card h2 {
    text-align: center;
    color: #333;
    margin-bottom: 30px;
}

@media (max-width: 768px) {
    .dashboard-cards {
        grid-template-columns: 1fr;
    }
    .row-duas-colunas {
        grid-template-columns: 1fr;
    }
    .form-row {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div id="loginScreen" class="login-container">
    <div class="login-card">
        <h2>💰 Fluxo de Caixa</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" id="username" placeholder="Digite seu usuário" value="admin">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" placeholder="Digite sua senha" value="123">
            </div>
            <button type="submit">Entrar</button>
        </form>
        <div id="loginMessage" class="message"></div>
    </div>
</div>

<div id="mainScreen" style="display:none;">
    <div class="container">
        <div class="header">
            <h1>💰 Fluxo de Caixa</h1>
            <button class="logout-btn" onclick="logout()">Sair</button>
        </div>

        <div class="dashboard-cards">
            <div class="card">
                <h3>Saldo Atual</h3>
                <div class="valor" id="saldo">R$ 0,00</div>
            </div>
            <div class="card">
                <h3>Total Entradas</h3>
                <div class="valor positivo" id="totalEntradas">R$ 0,00</div>
            </div>
            <div class="card">
                <h3>Total Saídas</h3>
                <div class="valor negativo" id="totalSaidas">R$ 0,00</div>
            </div>
        </div>

        <div class="row-duas-colunas">
            <div class="card-grafico">
                <h3>📊 Gráfico de Movimentações</h3>
                <canvas id="graficoMovimentacoes" width="400" height="300"></canvas>
            </div>
            <div class="card-relatorio">
                <h3>📋 Últimas Movimentações</h3>
                <div id="listaMovimentacoes" class="relatorio-lista">
                    <div style="text-align: center; color: #888;">Carregando...</div>
                </div>
            </div>
        </div>

        <div class="form-movimentacao">
            <h3>📝 Nova Movimentação</h3>
            <form id="movimentacaoForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Tipo</label>
                        <select id="tipo" required>
                            <option value="">Selecione...</option>
                            <option value="entrada">💰 Entrada</option>
                            <option value="saida">💸 Saída</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Valor (R$)</label>
                        <input type="number" id="valor" step="0.01" placeholder="0,00" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <input type="text" id="descricao" placeholder="Ex: Salário, Conta de luz...">
                </div>
                <button type="submit">Registrar Movimentação</button>
            </form>
            <div id="movimentacaoMessage" class="message"></div>
        </div>
    </div>
</div>

<script>
let grafico;

function formatarMoeda(valor) {
    return new Intl.NumberFormat('pt-BR', {
        style: 'currency',
        currency: 'BRL'
    }).format(valor);
}

async function carregarSaldo() {
    try {
        const res = await fetch("/api/saldo");
        const data = await res.json();
        
        if (data.success) {
            document.getElementById("saldo").innerHTML = formatarMoeda(data.saldo);
            document.getElementById("totalEntradas").innerHTML = formatarMoeda(data.entradas);
            document.getElementById("totalSaidas").innerHTML = formatarMoeda(data.saidas);
        }
    } catch (err) {
        console.error("Erro:", err);
    }
}

async function carregarMovimentacoes() {
    try {
        const res = await fetch("/api/movimentacoes");
        const data = await res.json();
        
        if (data.success && data.movimentacoes) {
            const lista = document.getElementById("listaMovimentacoes");
            
            if (data.movimentacoes.length === 0) {
                lista.innerHTML = '<div style="text-align: center; color: #888;">Nenhuma movimentação</div>';
                return;
            }
            
            lista.innerHTML = data.movimentacoes.map(mov => `
                <div class="relatorio-item">
                    <div class="relatorio-data">${new Date(mov.data).toLocaleDateString('pt-BR')}</div>
                    <div class="relatorio-descricao">${mov.descricao || '-'}</div>
                    <div class="relatorio-valor ${mov.tipo}">
                        ${mov.tipo === 'entrada' ? '+' : '-'} ${formatarMoeda(mov.valor)}
                    </div>
                </div>
            `).join('');
            
            atualizarGrafico(data.movimentacoes);
        }
    } catch (err) {
        console.error("Erro:", err);
    }
}

function atualizarGrafico(movimentacoes) {
    const entradas = movimentacoes.filter(m => m.tipo === 'entrada').reduce((s, m) => s + parseFloat(m.valor), 0);
    const saidas = movimentacoes.filter(m => m.tipo === 'saida').reduce((s, m) => s + parseFloat(m.valor), 0);
    
    const ctx = document.getElementById('graficoMovimentacoes').getContext('2d');
    
    if (grafico) {
        grafico.destroy();
    }
    
    grafico = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Entradas', 'Saídas'],
            datasets: [{
                data: [entradas, saidas],
                backgroundColor: ['#28a745', '#dc3545'],
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: {
                        font: { size: 14 }
                    }
                }
            }
        }
    });
}

// Login
document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const msg = document.getElementById("loginMessage");
    
    try {
        const res = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user: username, pass: password })
        });
        
        const data = await res.json();
        
        if (data.success) {
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("mainScreen").style.display = "block";
            await carregarSaldo();
            await carregarMovimentacoes();
        } else {
            msg.innerHTML = "❌ " + (data.error || "Login inválido");
            msg.className = "message error";
        }
    } catch (err) {
        msg.innerHTML = "❌ Erro ao conectar";
        msg.className = "message error";
    }
});

// Registrar movimentação
document.getElementById("movimentacaoForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    
    const tipo = document.getElementById("tipo").value;
    const valor = parseFloat(document.getElementById("valor").value);
    const descricao = document.getElementById("descricao").value;
    const msg = document.getElementById("movimentacaoMessage");
    
    if (!tipo || !valor || valor <= 0) {
        msg.innerHTML = "❌ Preencha todos os campos";
        msg.className = "message error";
        setTimeout(() => { msg.innerHTML = ""; }, 3000);
        return;
    }
    
    try {
        const res = await fetch("/api/movimentacao", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ tipo, valor, descricao })
        });
        
        const data = await res.json();
        
        if (data.success) {
            msg.innerHTML = "✅ Movimentação registrada!";
            msg.className = "message success";
            document.getElementById("tipo").value = "";
            document.getElementById("valor").value = "";
            document.getElementById("descricao").value = "";
            await carregarSaldo();
            await carregarMovimentacoes();
            setTimeout(() => { msg.innerHTML = ""; }, 3000);
        } else {
            msg.innerHTML = "❌ " + (data.error || "Erro");
            msg.className = "message error";
        }
    } catch (err) {
        msg.innerHTML = "❌ Erro ao conectar";
        msg.className = "message error";
    }
});

function logout() {
    location.reload();
}
</script>

</body>
</html>
