<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxo de Caixa</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #333;
        }

        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .valor {
            font-size: 28px;
            font-weight: bold;
        }

        .valor.positivo {
            color: #28a745;
        }

        .valor.negativo {
            color: #dc3545;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card-grafico, .card-lista {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .card-grafico h3, .card-lista h3 {
            margin-bottom: 15px;
            color: #333;
        }

        canvas {
            max-height: 300px;
            width: 100%;
        }

        .lista {
            max-height: 300px;
            overflow-y: auto;
        }

        .item-lista {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .item-lista:hover {
            background: #f8f9fa;
        }

        .data {
            font-size: 12px;
            color: #888;
            min-width: 80px;
        }

        .descricao {
            flex: 1;
            margin: 0 10px;
        }

        .valor-item.entrada {
            color: #28a745;
        }

        .valor-item.saida {
            color: #dc3545;
        }

        .form-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 350px;
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .message {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

        @media (max-width: 768px) {
            .cards, .row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div id="loginScreen" class="login-container">
    <div class="login-card">
        <h2>💰 Fluxo de Caixa</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" id="username" value="admin">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" value="123">
            </div>
            <button type="submit">Entrar</button>
        </form>
        <div id="loginMessage" class="message"></div>
    </div>
</div>

<div id="mainScreen" style="display: none;">
    <div class="container">
        <div class="header">
            <h1>💰 Fluxo de Caixa</h1>
            <div>
                <a href="/produtos" style="background: #667eea; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; margin-right: 10px;">📦 Produtos</a>
                <a href="/pdv" style="background: #667eea; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; margin-right: 10px;">🛒 PDV</a>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
        </div>

        <div class="cards">
            <div class="card">
                <h3>SALDO ATUAL</h3>
                <div class="valor" id="saldo">R$ 0,00</div>
            </div>
            <div class="card">
                <h3>TOTAL ENTRADAS</h3>
                <div class="valor positivo" id="totalEntradas">R$ 0,00</div>
            </div>
            <div class="card">
                <h3>TOTAL SAÍDAS</h3>
                <div class="valor negativo" id="totalSaidas">R$ 0,00</div>
            </div>
        </div>

        <div class="row">
            <div class="card-grafico">
                <h3>📊 Gráfico de Movimentações</h3>
                <canvas id="meuGrafico" width="400" height="300"></canvas>
            </div>
            <div class="card-lista">
                <h3>📋 Últimas Movimentações</h3>
                <div id="listaMovimentacoes" class="lista">Carregando...</div>
            </div>
        </div>

        <div class="form-card">
            <h3>📝 Nova Movimentação</h3>
            <form id="formMovimentacao">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Tipo</label>
                        <select id="tipo" required>
                            <option value="">Selecione</option>
                            <option value="entrada">💰 Entrada</option>
                            <option value="saida">💸 Saída</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Valor (R$)</label>
                        <input type="number" id="valor" step="0.01" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <input type="text" id="descricao" placeholder="Ex: Salário, Conta de luz...">
                </div>
                <button type="submit">Registrar</button>
            </form>
            <div id="msgMovimentacao" class="message"></div>
        </div>
    </div>
</div>

<script>
let grafico;

function formatarMoeda(valor) {
    return 'R$ ' + valor.toFixed(2).replace('.', ',');
}

async function carregarDados() {
    try {
        const res = await fetch('/api/saldo');
        const data = await res.json();
        
        if (data.success) {
            document.getElementById('saldo').innerHTML = formatarMoeda(data.saldo);
            document.getElementById('totalEntradas').innerHTML = formatarMoeda(data.entradas);
            document.getElementById('totalSaidas').innerHTML = formatarMoeda(data.saidas);
        }
    } catch (err) {
        console.error('Erro:', err);
    }
}

async function carregarMovimentacoes() {
    try {
        const res = await fetch('/api/movimentacoes');
        const data = await res.json();
        
        if (data.success && data.movimentacoes) {
            const lista = document.getElementById('listaMovimentacoes');
            
            if (data.movimentacoes.length === 0) {
                lista.innerHTML = '<div style="text-align: center;">Nenhuma movimentação</div>';
                return;
            }
            
            lista.innerHTML = data.movimentacoes.map(m => `
                <div class="item-lista">
                    <div class="data">${new Date(m.data).toLocaleDateString()}</div>
                    <div class="descricao">${m.descricao || '-'}</div>
                    <div class="valor-item ${m.tipo}">
                        ${m.tipo === 'entrada' ? '+' : '-'} ${formatarMoeda(m.valor)}
                    </div>
                </div>
            `).join('');
            
            atualizarGrafico(data.movimentacoes);
        }
    } catch (err) {
        console.error('Erro:', err);
    }
}

function atualizarGrafico(movimentacoes) {
    let entradas = 0;
    let saidas = 0;
    
    movimentacoes.forEach(m => {
        if (m.tipo === 'entrada') entradas += parseFloat(m.valor);
        else saidas += parseFloat(m.valor);
    });
    
    const ctx = document.getElementById('meuGrafico').getContext('2d');
    
    if (grafico) grafico.destroy();
    
    grafico = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Entradas', 'Saídas'],
            datasets: [{
                data: [entradas, saidas],
                backgroundColor: ['#28a745', '#dc3545'],
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });
}

// Login
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    
    try {
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user, pass })
        });
        
        const data = await res.json();
        
        if (data.success) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
            await carregarDados();
            await carregarMovimentacoes();
        } else {
            document.getElementById('loginMessage').innerHTML = '❌ ' + (data.error || 'Login inválido');
            document.getElementById('loginMessage').className = 'message error';
        }
    } catch (err) {
        document.getElementById('loginMessage').innerHTML = '❌ Erro ao conectar';
        document.getElementById('loginMessage').className = 'message error';
    }
});

// Registrar movimentação
document.getElementById('formMovimentacao').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const tipo = document.getElementById('tipo').value;
    const valor = parseFloat(document.getElementById('valor').value);
    const descricao = document.getElementById('descricao').value;
    
    if (!tipo || !valor) {
        alert('Preencha todos os campos');
        return;
    }
    
    try {
        const res = await fetch('/api/movimentacao', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tipo, valor, descricao })
        });
        
        const data = await res.json();
        
        if (data.success) {
            document.getElementById('formMovimentacao').reset();
            await carregarDados();
            await carregarMovimentacoes();
            const msg = document.getElementById('msgMovimentacao');
            msg.innerHTML = '✅ Movimentação registrada!';
            msg.className = 'message success';
            setTimeout(() => { msg.innerHTML = ''; }, 3000);
        } else {
            alert('Erro ao registrar');
        }
    } catch (err) {
        alert('Erro ao conectar');
    }
});

function logout() {
    location.reload();
}
</script>
</body>
</html>
