<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV - Ponto de Venda</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #333;
            font-size: 28px;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
        }

        .pdv-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 25px;
        }

        .carrinho {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .produtos {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .busca-produto {
            margin-bottom: 20px;
        }

        .busca-produto input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: center;
        }

        .busca-produto input:focus {
            outline: none;
            border-color: #667eea;
        }

        .info-produto {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }

        .info-produto.ativo {
            display: block;
        }

        .nome-produto {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .preco-produto {
            font-size: 24px;
            color: #28a745;
            font-weight: bold;
            margin: 10px 0;
        }

        .estoque {
            color: #666;
            font-size: 14px;
        }

        .quantidade {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .quantidade input {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: center;
        }

        .btn-adicionar {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }

        .tabela-carrinho {
            width: 100%;
            margin: 20px 0;
        }

        .tabela-carrinho table {
            width: 100%;
            border-collapse: collapse;
        }

        .tabela-carrinho th, .tabela-carrinho td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .tabela-carrinho th {
            background: #f8f9fa;
        }

        .total {
            text-align: right;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-top: 20px;
        }

        .total span {
            font-size: 24px;
            font-weight: bold;
            color: #28a745;
        }

        .finalizar {
            background: #28a745;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            width: 100%;
            margin-top: 15px;
        }

        .remover-item {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        .mensagem {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .mensagem.sucesso {
            background: #d4edda;
            color: #155724;
        }

        .mensagem.erro {
            background: #f8d7da;
            color: #721c24;
        }

        @media (max-width: 768px) {
            .pdv-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛒 PDV - Ponto de Venda</h1>
            <div class="nav-buttons">
                <a href="/" class="nav-btn">💰 Fluxo de Caixa</a>
                <a href="/produtos" class="nav-btn">📦 Produtos</a>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
        </div>

        <div class="pdv-container">
            <!-- Leitor de código de barras -->
            <div class="produtos">
                <div class="busca-produto">
                    <input type="text" id="codigoBarras" placeholder="🔍 Leia o código de barras ou digite aqui" autofocus>
                </div>
                
                <div id="infoProduto" class="info-produto">
                    <div class="nome-produto" id="produtoNome"></div>
                    <div class="preco-produto" id="produtoPreco">R$ 0,00</div>
                    <div class="estoque" id="produtoEstoque">Estoque: 0</div>
                    <div class="quantidade">
                        <input type="number" id="quantidade" value="1" min="1">
                    </div>
                    <button class="btn-adicionar" onclick="adicionarAoCarrinho()">➕ Adicionar ao Carrinho</button>
                </div>
            </div>

            <!-- Carrinho de compras -->
            <div class="carrinho">
                <h2>🛒 Carrinho de Compras</h2>
                
                <div class="tabela-carrinho">
                    <table>
                        <thead>
                            <tr>
                                <th>Produto</th>
                                <th>Qtd</th>
                                <th>Preço</th>
                                <th>Subtotal</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="carrinhoItens">
                            <tr>
                                <td colspan="5" style="text-align: center;">Carrinho vazio</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="total">
                    <strong>Total:</strong> <span id="totalCarrinho">R$ 0,00</span>
                </div>

                <div class="form-group">
                    <label>Cliente:</label>
                    <input type="text" id="clienteNome" placeholder="Nome do cliente (opcional)" style="width: 100%; padding: 10px; margin: 10px 0;">
                </div>

                <div class="form-group">
                    <label>Forma de Pagamento:</label>
                    <select id="formaPagamento" style="width: 100%; padding: 10px;">
                        <option value="dinheiro">💰 Dinheiro</option>
                        <option value="cartao_credito">💳 Cartão de Crédito</option>
                        <option value="cartao_debito">💳 Cartão de Débito</option>
                        <option value="pix">📱 PIX</option>
                    </select>
                </div>

                <button class="finalizar" onclick="finalizarVenda()">✅ Finalizar Venda</button>
                <div id="mensagem" class="mensagem"></div>
            </div>
        </div>
    </div>

    <script>
        let carrinho = [];
        let produtoAtual = null;

        // Buscar produto por código de barras
        document.getElementById('codigoBarras').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const codigo = e.target.value.trim();
                if (codigo) {
                    await buscarProduto(codigo);
                }
                e.target.value = '';
            }
        });

        async function buscarProduto(codigo) {
            try {
                const res = await fetch(`/api/produtos/buscar/${codigo}`);
                const data = await res.json();
                
                if (data.success) {
                    produtoAtual = data.produto;
                    document.getElementById('infoProduto').classList.add('ativo');
                    document.getElementById('produtoNome').textContent = produtoAtual.nome;
                    document.getElementById('produtoPreco').textContent = `R$ ${parseFloat(produtoAtual.preco_venda).toFixed(2)}`;
                    document.getElementById('produtoEstoque').textContent = `Estoque: ${produtoAtual.estoque}`;
                    document.getElementById('quantidade').value = 1;
                    document.getElementById('quantidade').focus();
                } else {
                    alert('Produto não encontrado!');
                    document.getElementById('infoProduto').classList.remove('ativo');
                }
            } catch (err) {
                alert('Erro ao buscar produto');
            }
        }

        function adicionarAoCarrinho() {
            if (!produtoAtual) return;
            
            const quantidade = parseInt(document.getElementById('quantidade').value);
            
            if (quantidade > produtoAtual.estoque) {
                alert(`Estoque insuficiente! Disponível: ${produtoAtual.estoque}`);
                return;
            }
            
            const itemExistente = carrinho.find(item => item.id === produtoAtual.id);
            
            if (itemExistente) {
                itemExistente.quantidade += quantidade;
                itemExistente.subtotal = itemExistente.quantidade * itemExistente.preco_unitario;
            } else {
                carrinho.push({
                    id: produtoAtual.id,
                    nome: produtoAtual.nome,
                    quantidade: quantidade,
                    preco_unitario: parseFloat(produtoAtual.preco_venda),
                    subtotal: quantidade * parseFloat(produtoAtual.preco_venda)
                });
            }
            
            atualizarCarrinho();
            
            // Limpar e focar novamente na leitura
            document.getElementById('codigoBarras').value = '';
            document.getElementById('infoProduto').classList.remove('ativo');
            document.getElementById('codigoBarras').focus();
            produtoAtual = null;
        }

        function removerDoCarrinho(index) {
            carrinho.splice(index, 1);
            atualizarCarrinho();
        }

        function atualizarCarrinho() {
            const tbody = document.getElementById('carrinhoItens');
            const total = carrinho.reduce((sum, item) => sum + item.subtotal, 0);
            
            if (carrinho.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">Carrinho vazio</td></tr>';
                document.getElementById('totalCarrinho').textContent = 'R$ 0,00';
                return;
            }
            
            tbody.innerHTML = carrinho.map((item, index) => `
                <tr>
                    <td>${item.nome}</td>
                    <td>${item.quantidade}</td>
                    <td>R$ ${item.preco_unitario.toFixed(2)}</td>
                    <td>R$ ${item.subtotal.toFixed(2)}</td>
                    <td><button class="remover-item" onclick="removerDoCarrinho(${index})">X</button></td>
                </tr>
            `).join('');
            
            document.getElementById('totalCarrinho').textContent = `R$ ${total.toFixed(2)}`;
        }

        async function finalizarVenda() {
            if (carrinho.length === 0) {
                alert('Carrinho vazio!');
                return;
            }
            
            const cliente_nome = document.getElementById('clienteNome').value;
            const forma_pagamento = document.getElementById('formaPagamento').value;
            
            const venda = {
                itens: carrinho.map(item => ({
                    produto_id: item.id,
                    quantidade: item.quantidade,
                    preco_unitario: item.preco_unitario
                })),
                cliente_nome: cliente_nome || 'Cliente não identificado',
                forma_pagamento: forma_pagamento
            };
            
            try {
                const res = await fetch('/api/vendas', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(venda)
                });
                
                const data = await res.json();
                
                if (data.success) {
                    const msg = document.getElementById('mensagem');
                    msg.innerHTML = `✅ Venda finalizada! Total: R$ ${data.total.toFixed(2)}`;
                    msg.className = 'mensagem sucesso';
                    
                    // Limpar carrinho
                    carrinho = [];
                    atualizarCarrinho();
                    document.getElementById('clienteNome').value = '';
                    
                    setTimeout(() => {
                        msg.innerHTML = '';
                        msg.className = 'mensagem';
                    }, 3000);
                    
                    // Focar no leitor
                    document.getElementById('codigoBarras').focus();
                } else {
                    alert('Erro ao finalizar venda');
                }
            } catch (err) {
                alert('Erro ao conectar');
            }
        }

        function logout() {
            window.location.href = '/';
        }
    </script>
</body>
</html>
