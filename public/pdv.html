<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PDV - Ponto de Venda</title>
    <style>
        :root {
            --primary: #4361ee;
            --primary-dark: #3a56d4;
            --secondary: #7209b7;
            --success: #06d6a0;
            --danger: #ef476f;
            --warning: #ffd166;
            --dark: #2b2d42;
            --light: #f8f9fa;
            --gray: #6c757d;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --shadow-hover: 0 15px 40px rgba(0,0,0,0.15);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: var(--shadow);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }

        .logo h1 {
            font-size: 24px;
            color: var(--dark);
        }

        .logo p {
            font-size: 12px;
            color: var(--gray);
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: var(--light);
            color: var(--dark);
            padding: 10px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        .logout-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
        }

        .pdv-container {
            display: grid;
            grid-template-columns: 1fr 450px;
            gap: 25px;
        }

        @media (max-width: 768px) {
            .pdv-container {
                grid-template-columns: 1fr;
            }
            .header {
                flex-direction: column;
                text-align: center;
            }
            .nav-buttons {
                justify-content: center;
            }
        }

        .card {
            background: var(--white);
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--shadow);
        }

        .card h2 {
            margin-bottom: 20px;
            color: var(--dark);
            font-size: 20px;
            border-left: 4px solid var(--primary);
            padding-left: 15px;
        }

        .busca-produto input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            text-align: center;
            transition: var(--transition);
        }

        .busca-produto input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }

        .info-produto {
            background: var(--light);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .info-produto.ativo {
            display: block;
        }

        .nome-produto {
            font-size: 22px;
            font-weight: bold;
            color: var(--dark);
        }

        .preco-produto {
            font-size: 32px;
            color: var(--success);
            font-weight: bold;
            margin: 10px 0;
        }

        .estoque {
            color: var(--gray);
            margin-bottom: 15px;
        }

        .quantidade {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .quantidade input {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            text-align: center;
        }

        .btn-adicionar {
            background: linear-gradient(135deg, var(--success), #2ecc71);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            transition: var(--transition);
        }

        .btn-adicionar:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .tabela-carrinho {
            width: 100%;
            margin: 20px 0;
            overflow-x: auto;
        }

        .tabela-carrinho table {
            width: 100%;
            border-collapse: collapse;
        }

        .tabela-carrinho th,
        .tabela-carrinho td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .tabela-carrinho th {
            background: var(--light);
            font-weight: bold;
        }

        .total {
            text-align: right;
            padding: 15px;
            background: var(--light);
            border-radius: 12px;
            margin: 20px 0;
        }

        .total span {
            font-size: 28px;
            font-weight: bold;
            color: var(--success);
        }

        .finalizar {
            background: linear-gradient(135deg, var(--success), #2ecc71);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            margin-top: 15px;
            transition: var(--transition);
        }

        .finalizar:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .remover-item {
            background: var(--danger);
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 14px;
        }

        .mensagem {
            margin-top: 15px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        .mensagem.sucesso {
            background: #d4edda;
            color: #155724;
        }

        .mensagem.erro {
            background: #f8d7da;
            color: #721c24;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">🛒</div>
                <div>
                    <h1>Ponto de Venda</h1>
                    <p>Sistema rápido e eficiente</p>
                </div>
            </div>
            <div class="nav-buttons">
                <a href="/" class="nav-btn">💰 Fluxo de Caixa</a>
                <a href="/produtos" class="nav-btn">📦 Produtos</a>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
        </div>

        <div class="pdv-container">
            <div class="card">
                <div class="busca-produto">
                    <input type="text" id="codigoBarras" placeholder="🔍 Leia o código de barras ou digite aqui" autofocus>
                </div>
                
                <div id="infoProduto" class="info-produto">
                    <div class="nome-produto" id="produtoNome"></div>
                    <div class="preco-produto" id="produtoPreco">R$ 0,00</div>
                    <div class="estoque" id="produtoEstoque">Estoque: 0</div>
                    <div class="quantidade">
                        <input type="number" id="quantidade" value="1" min="1">
                    </div>
                    <button class="btn-adicionar" onclick="adicionarAoCarrinho()">➕ Adicionar ao Carrinho</button>
                </div>
            </div>

            <div class="card">
                <h2>🛒 Carrinho de Compras</h2>
                
                <div class="tabela-carrinho">
                    <table>
                        <thead>
                            <tr><th>Produto</th><th>Qtd</th><th>Preço</th><th>Subtotal</th><th></th></tr>
                        </thead>
                        <tbody id="carrinhoItens">
                            <tr><td colspan="5" style="text-align: center; padding: 40px;">🛍️ Carrinho vazio</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="total">
                    <strong>Total:</strong> <span id="totalCarrinho">R$ 0,00</span>
                </div>

                <div class="form-group">
                    <label>👤 Cliente:</label>
                    <input type="text" id="clienteNome" placeholder="Nome do cliente (opcional)">
                </div>

                <div class="form-group">
                    <label>💳 Forma de Pagamento:</label>
                    <select id="formaPagamento">
                        <option value="dinheiro">💰 Dinheiro</option>
                        <option value="cartao_credito">💳 Cartão de Crédito</option>
                        <option value="cartao_debito">💳 Cartão de Débito</option>
                        <option value="pix">📱 PIX</option>
                    </select>
                </div>

                <button class="finalizar" onclick="finalizarVenda()">✅ Finalizar Venda</button>
                <div id="mensagem" class="mensagem"></div>
            </div>
        </div>
    </div>

    <script>
        let carrinho = [];
        let produtoAtual = null;

        document.getElementById('codigoBarras').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const codigo = e.target.value.trim();
                if (codigo) await buscarProduto(codigo);
                e.target.value = '';
            }
        });

        async function buscarProduto(codigo) {
            try {
                const res = await fetch(`/api/produtos/buscar/${codigo}`);
                const data = await res.json();
                
                if (data.success) {
                    produtoAtual = data.produto;
                    const info = document.getElementById('infoProduto');
                    info.classList.add('ativo');
                    document.getElementById('produtoNome').textContent = produtoAtual.nome;
                    document.getElementById('produtoPreco').textContent = `R$ ${parseFloat(produtoAtual.preco_venda).toFixed(2)}`;
                    document.getElementById('produtoEstoque').textContent = `Estoque: ${produtoAtual.estoque} unidades`;
                    document.getElementById('quantidade').value = 1;
                    document.getElementById('quantidade').focus();
                } else {
                    mostrarMensagem('❌ Produto não encontrado!', 'erro');
                    document.getElementById('infoProduto').classList.remove('ativo');
                    produtoAtual = null;
                }
            } catch (err) {
                mostrarMensagem('❌ Erro ao buscar produto', 'erro');
            }
        }

        function adicionarAoCarrinho() {
            if (!produtoAtual) return;
            
            const quantidade = parseInt(document.getElementById('quantidade').value);
            if (quantidade <= 0) return;
            if (quantidade > produtoAtual.estoque) {
                mostrarMensagem(`⚠️ Estoque insuficiente! Disponível: ${produtoAtual.estoque}`, 'erro');
                return;
            }
            
            const existente = carrinho.find(item => item.id === produtoAtual.id);
            if (existente) {
                existente.quantidade += quantidade;
                existente.subtotal = existente.quantidade * existente.preco_unitario;
            } else {
                carrinho.push({
                    id: produtoAtual.id,
                    nome: produtoAtual.nome,
                    quantidade: quantidade,
                    preco_unitario: parseFloat(produtoAtual.preco_venda),
                    subtotal: quantidade * parseFloat(produtoAtual.preco_venda)
                });
            }
            
            atualizarCarrinho();
            mostrarMensagem(`✅ ${produtoAtual.nome} adicionado!`, 'sucesso');
            document.getElementById('codigoBarras').value = '';
            document.getElementById('infoProduto').classList.remove('ativo');
            document.getElementById('codigoBarras').focus();
            produtoAtual = null;
        }

        function removerDoCarrinho(index) {
            const removido = carrinho[index].nome;
            carrinho.splice(index, 1);
            atualizarCarrinho();
            mostrarMensagem(`🗑️ ${removido} removido`, 'sucesso');
        }

        function atualizarCarrinho() {
            const tbody = document.getElementById('carrinhoItens');
            const total = carrinho.reduce((s, i) => s + i.subtotal, 0);
            
            if (carrinho.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px;">🛍️ Carrinho vazio</td></tr>';
                document.getElementById('totalCarrinho').textContent = 'R$ 0,00';
                return;
            }
            
            tbody.innerHTML = carrinho.map((item, i) => `
                <tr>
                    <td><strong>${item.nome}</strong></td>
                    <td>${item.quantidade}</td>
                    <td>R$ ${item.preco_unitario.toFixed(2)}</td>
                    <td style="color: var(--success); font-weight: bold;">R$ ${item.subtotal.toFixed(2)}</td>
                    <td><button class="remover-item" onclick="removerDoCarrinho(${i})">✖</button></td>
                </tr>
            `).join('');
            
            document.getElementById('totalCarrinho').textContent = `R$ ${total.toFixed(2)}`;
        }

        async function finalizarVenda() {
            if (carrinho.length === 0) {
                mostrarMensagem('❌ Carrinho vazio!', 'erro');
                return;
            }
            
            const itens = carrinho.map(item => ({
                produto_id: item.id,
                quantidade: item.quantidade,
                preco_unitario: item.preco_unitario
            }));
            
            const venda = {
                itens: itens,
                cliente_nome: document.getElementById('clienteNome').value || 'Cliente',
                forma_pagamento: document.getElementById('formaPagamento').value
            };
            
            try {
                const res = await fetch('/api/venda-simples', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(venda)
                });
                
                const data = await res.json();
                
                if (data.success) {
                    const totalVenda = carrinho.reduce((s, i) => s + i.subtotal, 0);
                    alert(`✅ Venda finalizada!\nTotal: R$ ${totalVenda.toFixed(2)}`);
                    carrinho = [];
                    atualizarCarrinho();
                    document.getElementById('clienteNome').value = '';
                    document.getElementById('codigoBarras').focus();
                    mostrarMensagem('✅ Venda realizada com sucesso!', 'sucesso');
                } else {
                    mostrarMensagem('❌ ' + (data.error || 'Erro ao finalizar'), 'erro');
                }
            } catch (err) {
                mostrarMensagem('❌ Erro ao conectar', 'erro');
            }
        }

        function mostrarMensagem(texto, tipo) {
            const msg = document.getElementById('mensagem');
            msg.textContent = texto;
            msg.className = `mensagem ${tipo}`;
            setTimeout(() => { msg.textContent = ''; msg.className = 'mensagem'; }, 3000);
        }

        function logout() { window.location.href = '/'; }
    </script>
</body>
</html>
