<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Fluxo de Caixa</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* (SEU CSS ORIGINAL - NÃO MEXI EM NADA) */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
}
.container { max-width: 1200px; margin: 0 auto; }
.header {
    background: white;
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
}
.header h1 { color: #667eea; }
.card {
    background: white;
    border-radius: 15px;
    padding: 25px;
    margin-bottom: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
.card h2 {
    color: #333;
    margin-bottom: 20px;
    border-bottom: 2px solid #667eea;
    padding-bottom: 10px;
}
.form-group { margin-bottom: 15px; }
label { display: block; margin-bottom: 5px; color: #555; font-weight: bold; }
input, select {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
}
button {
    background: #667eea;
    color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 8px;
    cursor: pointer;
}
button:hover { background: #764ba2; }
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginScreen">
    <div class="card">
        <h2>🔐 Login</h2>

        <form id="loginForm">
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" id="username" value="admin">
            </div>

            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" value="123">
            </div>

            <button type="submit">Entrar</button>
        </form>

        <div id="loginMessage"></div>
    </div>
</div>

<!-- SISTEMA -->
<div id="mainScreen" style="display:none;">
    <div class="header">
        <h1>💰 Sistema de Fluxo de Caixa</h1>
    </div>

    <div class="card">
        <h2>Nova Movimentação</h2>

        <form id="movimentacaoForm">
            <div class="form-group">
                <label>Tipo</label>
                <select id="tipo">
                    <option value="entrada">Entrada</option>
                    <option value="saida">Saída</option>
                </select>
            </div>

            <div class="form-group">
                <label>Valor</label>
                <input type="number" id="valor">
            </div>

            <div class="form-group">
                <label>Descrição</label>
                <input type="text" id="descricao">
            </div>

            <button type="submit">Salvar</button>
        </form>

        <div id="movMessage"></div>
    </div>
</div>

</div>

<script>
// ========================
// LOGIN
// ========================
document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/api/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            user: username,
            pass: password
        })
    });

    const data = await res.json();

    if (data.success) {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("mainScreen").style.display = "block";
    } else {
        document.getElementById("loginMessage").innerHTML =
            "<p style='color:red;'>Login inválido</p>";
    }
});


// ========================
// MOVIMENTAÇÃO
// ========================
document.getElementById("movimentacaoForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const tipo = document.getElementById("tipo").value;
    const valor = document.getElementById("valor").value;
    const descricao = document.getElementById("descricao").value;

    const res = await fetch("/api/movimentacao", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            tipo,
            valor,
            descricao
        })
    });

    const data = await res.json();

    if (data.success) {
        document.getElementById("movMessage").innerHTML =
            "<p style='color:green;'>Salvo com sucesso!</p>";
    } else {
        document.getElementById("movMessage").innerHTML =
            "<p style='color:red;'>Erro ao salvar</p>";
    }
});
</script>

</body>
</html>
